server:
  port: 8080

spring:
  application:
    name: java-control-plane
  jackson:
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://154.219.109.125:${POSTGRES_PORT:5432}/ocr_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:StrongPass_123!}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:127.0.0.1}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:ocr_admin}
    password: ${SPRING_RABBITMQ_PASSWORD:ocr_password123}
    virtual-host: ${SPRING_RABBITMQ_VHOST:/}

ocr:
  security:
    require-user-auth: ${OCR_REQUIRE_USER_AUTH:true}
    public-paths:
      - /api/auth/me
      - /api/auth/login
      - /api/auth/register
      - /api/auth/logout
      - /api/dev/dashboard
    cors-allowed-origins:
      - ${OCR_CORS_ALLOWED_ORIGIN_1:http://localhost:3000}
      - ${OCR_CORS_ALLOWED_ORIGIN_2:http://127.0.0.1:3000}
      - ${OCR_CORS_ALLOWED_ORIGIN_3:http://localhost:5173}
      - ${OCR_CORS_ALLOWED_ORIGIN_4:http://127.0.0.1:5173}
    cors-allow-credentials: ${OCR_CORS_ALLOW_CREDENTIALS:true}
    cors-max-age-seconds: ${OCR_CORS_MAX_AGE_SECONDS:3600}
  auth:
    enabled: ${AUTH_ENABLED:true}
    username: ${AUTH_USERNAME:admin}
    password: ${AUTH_PASSWORD:change-me}
    secret: ${AUTH_SECRET:change-this-secret}
    cookie-name: ${AUTH_COOKIE_NAME:ocr_session}
    cookie-secure: ${AUTH_COOKIE_SECURE:false}
    cookie-same-site: ${AUTH_COOKIE_SAMESITE:lax}
    session-ttl: ${AUTH_SESSION_TTL:28800}
  dev-dashboard:
    enabled: ${DEV_DASHBOARD_ENABLED:true}
    username: ${DEV_DASHBOARD_USERNAME:}
    password: ${DEV_DASHBOARD_PASSWORD:}
    cookie-name: ${DEV_DASHBOARD_COOKIE_NAME:ocr_dev_dashboard_session}
    session-ttl: ${DEV_DASHBOARD_SESSION_TTL:28800}
    celery-queue: ${CELERY_TASK_QUEUE:ocr.compute.internal.queue}
    python-metrics-path: ${DEV_DASHBOARD_PYTHON_METRICS_PATH:/internal/api/v1/worker/metrics}
  storage:
    backend: ${OCR_STORAGE_BACKEND:s3}
    upload-dir: ${OCR_STORAGE_UPLOAD_DIR:./uploads-java}
    bucket: ${OCR_STORAGE_BUCKET:ocr-source}
    endpoint: ${OCR_STORAGE_ENDPOINT:http://154.219.109.125:9000}
    region: ${OCR_STORAGE_REGION:us-east-1}
    access-key: ${OCR_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${OCR_STORAGE_SECRET_KEY:change_me_minio}
    key-prefix: ${OCR_STORAGE_KEY_PREFIX:uploads}
    path-style: ${OCR_STORAGE_PATH_STYLE:true}
  local-path:
    roots: ${LOCAL_PATH_ROOTS:../docker-data/minio/data/ocr-source/uploads,./uploads-java,../app/uploads,../app}
  ai:
    base-url: ${OCR_AI_BASE_URL:http://127.0.0.1:8001}
    health-path: ${OCR_AI_HEALTH_PATH:/api/health}
    connect-timeout-seconds: ${OCR_AI_CONNECT_TIMEOUT_SECONDS:10}
    read-timeout-seconds: ${OCR_AI_READ_TIMEOUT_SECONDS:300}
    circuit-failure-threshold: ${OCR_AI_CIRCUIT_FAILURE_THRESHOLD:5}
    circuit-open-seconds: ${OCR_AI_CIRCUIT_OPEN_SECONDS:30}
  processing:
    layout-backend: ${OCR_LAYOUT_BACKEND:local}
    vl-backend: ${OCR_VL_BACKEND:auto}
    enable-hierarchical-agent: ${ENABLE_HIERARCHICAL_AGENT:false}
    llm-backend: ${OCR_PROCESSING_LLM_BACKEND:local}
    llm-model: ${OCR_PROCESSING_LLM_MODEL:}
    processing-strategy: ${OCR_PROCESSING_STRATEGY:auto}
    max-retries: ${MAX_RETRIES:2}
    confidence-threshold: ${CONFIDENCE_THRESHOLD:0.85}
    human-review-threshold-low: ${HUMAN_REVIEW_MIN_CONFIDENCE:0.60}
    human-review-threshold-high: ${HUMAN_REVIEW_MAX_CONFIDENCE:0.85}
    timeout-seconds: ${OCR_PROCESSING_TIMEOUT_SECONDS:1800}
    gpu-profile: ${OCR_GPU_PROFILE:single_gpu}
    langgraph-graph: ${OCR_LANGGRAPH_GRAPH:batch_supervisor_v1}
  rate-limit:
    enabled: ${OCR_RATE_LIMIT_ENABLED:true}
    window-seconds: ${OCR_RATE_LIMIT_WINDOW_SECONDS:60}
    upload-max-requests: ${OCR_RATE_LIMIT_UPLOAD_MAX_REQUESTS:30}
    batch-ai-max-requests: ${OCR_RATE_LIMIT_BATCH_AI_MAX_REQUESTS:90}
    preview-max-requests: ${OCR_RATE_LIMIT_PREVIEW_MAX_REQUESTS:240}
    general-max-requests: ${OCR_RATE_LIMIT_GENERAL_MAX_REQUESTS:600}
  mq:
    command:
      exchange: ocr.task.command.exchange
      queue: ocr.task.command.queue
      routing-key: ocr.task.submit.v1
      dead-letter-exchange: ocr.task.command.dlx
      dead-letter-queue: ocr.task.command.dlq
  internal-api:
    token: ${OCR_INTERNAL_API_TOKEN:change-this-internal-token}
    base-url: ${OCR_CONTROL_PLANE_BASE_URL:http://127.0.0.1:8080}
