name: ${COMPOSE_PROJECT_NAME:-ocr-middleware}

services:
  postgres:
    image: postgres:17
    container_name: ocr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ocr_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./docker-data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - middleware

  rabbitmq:
    image: rabbitmq:4-management
    container_name: ocr-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ocr_admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ocr_password123}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - ./docker-data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - middleware

  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - middleware

  minio:
    image: minio/minio:latest
    container_name: ocr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${OCR_STORAGE_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${OCR_STORAGE_SECRET_KEY:-admin123456}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./docker-data/minio/data:/data
    networks:
      - middleware

  minio-init:
    profiles: ["setup"]
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - >-
        until /usr/bin/mc alias set local http://minio:9000 "${OCR_STORAGE_ACCESS_KEY:-admin}" "${OCR_STORAGE_SECRET_KEY:-admin123456}";
        do sleep 2; done;
        /usr/bin/mc mb --ignore-existing "local/${OCR_STORAGE_BUCKET:-ocr-source}";
    restart: "no"
    networks:
      - middleware

networks:
  middleware:
    name: ocr-middleware
