services:
  ai-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: unless-stopped
    env_file:
      - .env.fullstack
    command: ["python", "-m", "app.main_ai"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${AI_API_PORT:-8001}:8001"
    volumes:
      - ./:/workspace
    networks:
      - middleware

  worker:
    build:
      context: .
      dockerfile: Dockerfile.python
    restart: unless-stopped
    env_file:
      - .env.fullstack
    command: ["python", "-m", "app.main_worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      java-control-plane:
        condition: service_started
    volumes:
      - ./:/workspace
    networks:
      - middleware

  java-control-plane:
    build:
      context: .
      dockerfile: java-control-plane/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.fullstack
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-api:
        condition: service_started
    ports:
      - "${CONTROL_PLANE_PORT:-8080}:8080"
    volumes:
      - ./:/workspace
    networks:
      - middleware

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      java-control-plane:
        condition: service_started
      ai-api:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - middleware
